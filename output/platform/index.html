<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Sovereignty Brief · Content Studio</title>
<meta name="description" content="Content operations studio for a tech-policy Instagram account: calendar, hook vault, scheduler, analytics, competitor tracker, and trend radar.">
<style>
  :root {
    --bg: #faf9f5; --panel: #ffffff; --panel-2: #f4f2ec; --ink: #1a1917; --muted: #75726b;
    --line: #e8e5dd; --line-strong: #d9d5ca; --accent: #c15f3c; --accent-ink: #a34d2e;
    --accent-soft: #f6e9e1; --green: #3d7a5c; --green-soft: #e6efe8; --amber: #a3730a;
    --amber-soft: #f7eed8; --blue: #3d6b8f; --blue-soft: #e5edf3;
    --shadow: 0 1px 2px rgba(26,25,23,.05), 0 10px 30px rgba(26,25,23,.06);
    --shadow-lg: 0 4px 12px rgba(26,25,23,.08), 0 24px 60px rgba(26,25,23,.14);
    --serif: "Iowan Old Style", "Palatino Linotype", Charter, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16150f; --panel: #201f17; --panel-2: #262419; --ink: #ece8de; --muted: #a29c8d;
      --line: #302d21; --line-strong: #423e2e; --accent: #e0855b; --accent-ink: #eb9a74;
      --accent-soft: #362317; --green: #79b894; --green-soft: #1f2e24; --amber: #d9a94e;
      --amber-soft: #33290f; --blue: #86aecd; --blue-soft: #1c2833;
      --shadow: 0 1px 2px rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.35);
      --shadow-lg: 0 4px 12px rgba(0,0,0,.4), 0 24px 60px rgba(0,0,0,.55);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 var(--sans); -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent-soft); }
  button { font: inherit; color: inherit; }
  a { color: var(--accent); }

  .app { display: flex; min-height: 100vh; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    flex: 0 0 236px; border-right: 1px solid var(--line); padding: 26px 18px 20px;
    display: flex; flex-direction: column; gap: 26px; position: sticky; top: 0; height: 100vh;
    background: var(--bg);
  }
  .brand .word { font-family: var(--serif); font-size: 21px; font-weight: 700; letter-spacing: -.01em; line-height: 1.15; }
  .brand .word em { font-style: italic; color: var(--accent); }
  .brand .tag { font-family: var(--mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-top: 7px; }
  .who { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel); }
  .who .ava { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #8f4326); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 12px; flex: 0 0 auto; }
  .who .nm { font-size: 13px; font-weight: 650; line-height: 1.2; }
  .who .hd { font-family: var(--mono); font-size: 10.5px; color: var(--muted); }
  nav { display: flex; flex-direction: column; gap: 2px; }
  nav a {
    display: flex; align-items: center; gap: 10px; padding: 8px 11px; border-radius: 9px;
    font-family: var(--mono); font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); text-decoration: none; border: 1px solid transparent;
  }
  nav a .ic { width: 15px; text-align: center; font-family: var(--sans); font-size: 13px; opacity: .85; }
  nav a:hover { color: var(--ink); background: var(--panel); }
  nav a.on { color: var(--accent-ink); background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 25%, transparent); font-weight: 600; }
  .side-foot { margin-top: auto; display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: var(--muted); }
  .side-foot a { color: var(--muted); text-decoration: none; }
  .side-foot a:hover { color: var(--accent); }
  .side-foot .rst { background: none; border: none; padding: 0; text-align: left; cursor: pointer; font-size: 12px; color: var(--muted); }
  .side-foot .rst:hover { color: var(--accent); }

  /* ---------- Main ---------- */
  main { flex: 1; min-width: 0; padding: 30px 36px 80px; max-width: 1120px; }
  .page-head { margin-bottom: 22px; }
  .crumb { font-family: var(--mono); font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  h1.title { font-family: var(--serif); font-size: 32px; margin: 0 0 6px; letter-spacing: -.01em; line-height: 1.1; }
  h1.title em { font-style: italic; color: var(--accent); }
  .lede { color: var(--muted); font-size: 14px; max-width: 62ch; }
  .headrow { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); }
  .pad { padding: 18px 20px; }
  .grid { display: grid; gap: 14px; }
  .cols-2 { grid-template-columns: 1fr 1fr; }
  .cols-3 { grid-template-columns: repeat(3, 1fr); }
  .cols-4 { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 1100px) { .cols-4 { grid-template-columns: repeat(2, 1fr); } .cols-3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 700px) { .cols-2, .cols-3, .cols-4 { grid-template-columns: 1fr; } }

  .klabel { font-family: var(--mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
  .stat-n { font-family: var(--serif); font-size: 30px; font-weight: 700; margin-top: 6px; line-height: 1; }
  .stat-n small { font-size: 15px; color: var(--muted); font-weight: 400; font-family: var(--sans); }
  .stat-s { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 10px;
    border: 1px solid var(--line-strong); background: var(--panel); cursor: pointer; font-size: 13px;
    font-weight: 600; text-decoration: none; color: var(--ink); transition: border-color .12s, background .12s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-ink); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { filter: brightness(1.06); color: #fff; }
  .btn.sm { padding: 4px 10px; font-size: 12px; border-radius: 8px; }
  .btn.ghost { border-color: transparent; background: transparent; color: var(--muted); }
  .btn.ghost:hover { color: var(--accent-ink); }

  .pill { display: inline-block; font-family: var(--mono); font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
  .pill.reel { background: var(--accent-soft); color: var(--accent-ink); }
  .pill.carousel { background: var(--green-soft); color: var(--green); }
  .pill.story { background: var(--amber-soft); color: var(--amber); }
  .pill.neutral { background: var(--panel-2); color: var(--muted); }
  .pill.blue { background: var(--blue-soft); color: var(--blue); }

  .st { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--line-strong); color: var(--muted); background: transparent; cursor: pointer; }
  .st .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line-strong); }
  .st.draft .dot { background: var(--muted); }
  .st.ready .dot { background: var(--amber); }
  .st.scheduled .dot { background: var(--blue); }
  .st.posted .dot { background: var(--green); }
  .st.posted { color: var(--green); border-color: color-mix(in srgb, var(--green) 40%, transparent); }
  .st.scheduled { color: var(--blue); }

  /* ---------- Calendar ---------- */
  .cal-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .cal-nav { display: flex; align-items: center; gap: 8px; }
  .cal-month { font-family: var(--serif); font-size: 19px; font-weight: 700; min-width: 170px; }
  .cal-meta { font-family: var(--mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .cal { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: var(--panel); box-shadow: var(--shadow); }
  .cal-head { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--panel-2); border-bottom: 1px solid var(--line); }
  .cal-head div { padding: 8px 10px; font-family: var(--mono); font-size: 9.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); text-align: left; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell { min-height: 104px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 7px 8px; position: relative; }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.out { background: color-mix(in srgb, var(--panel-2) 55%, var(--panel)); }
  .cal-cell .dnum { font-size: 11.5px; color: var(--muted); font-weight: 600; }
  .cal-cell.today .dnum { display: inline-grid; place-items: center; min-width: 20px; height: 20px; border-radius: 7px; background: var(--accent); color: #fff; padding: 0 4px; }
  .slot {
    margin-top: 5px; padding: 5px 7px; border-radius: 7px; cursor: pointer; border: 1px solid transparent;
    font-family: var(--mono); font-size: 9.5px; line-height: 1.45; letter-spacing: .02em;
  }
  .slot b { display: block; font-size: 10px; letter-spacing: .06em; }
  .slot.reel { background: var(--accent-soft); color: var(--accent-ink); }
  .slot.carousel { background: var(--green-soft); color: var(--green); }
  .slot.story { background: var(--amber-soft); color: var(--amber); }
  .slot:hover { border-color: currentColor; }
  .slot .hk { font-family: var(--sans); font-size: 10.5px; color: var(--ink); letter-spacing: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-top: 1px; }
  .legend { display: flex; gap: 14px; margin-top: 12px; font-size: 11.5px; color: var(--muted); flex-wrap: wrap; }
  .legend i { display: inline-block; width: 9px; height: 9px; border-radius: 3px; margin-right: 5px; }

  /* ---------- Side panel ---------- */
  .scrim { position: fixed; inset: 0; background: rgba(20,18,14,.4); opacity: 0; pointer-events: none; transition: opacity .18s; z-index: 40; }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(480px, 94vw); background: var(--panel);
    border-left: 1px solid var(--line); box-shadow: var(--shadow-lg); z-index: 50; transform: translateX(103%);
    transition: transform .22s cubic-bezier(.32,.72,.35,1); display: flex; flex-direction: column;
  }
  .panel.open { transform: translateX(0); }
  .panel-head { padding: 20px 22px 14px; border-bottom: 1px solid var(--line); }
  .panel-body { padding: 18px 22px 30px; overflow-y: auto; flex: 1; }
  .panel-x { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--line); background: var(--panel); cursor: pointer; color: var(--muted); }
  .panel-x:hover { color: var(--accent); border-color: var(--accent); }
  .panel h2 { font-family: var(--serif); font-size: 21px; margin: 10px 0 4px; line-height: 1.25; padding-right: 30px; }
  .panel .when { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .06em; }
  .fld { margin-top: 18px; }
  .fld .klabel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .copybtn { font-family: var(--mono); font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; background: none; border: 1px solid var(--line-strong); border-radius: 6px; padding: 2px 8px; cursor: pointer; color: var(--muted); }
  .copybtn:hover { color: var(--accent-ink); border-color: var(--accent); }
  .hookbox { border-left: 3px solid var(--accent); background: var(--accent-soft); padding: 10px 13px; border-radius: 0 9px 9px 0; font-weight: 600; font-size: 14.5px; }
  .prose { white-space: pre-wrap; font-size: 13.5px; line-height: 1.65; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
  .tags { font-family: var(--mono); font-size: 12px; color: var(--blue); }
  .panel-actions { display: flex; gap: 8px; margin-top: 22px; flex-wrap: wrap; }

  /* ---------- Modal ---------- */
  .modal { position: fixed; inset: 0; display: none; place-items: center; z-index: 60; padding: 20px; }
  .modal.open { display: grid; }
  .modal .m-card { width: min(640px, 96vw); max-height: 92vh; overflow-y: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-lg); padding: 24px 26px; position: relative; z-index: 61; }
  .m-card h2 { font-family: var(--serif); margin: 0 0 16px; font-size: 22px; }
  .frm { display: grid; gap: 13px; }
  .frm .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .frm .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 560px) { .frm .row, .frm .row3 { grid-template-columns: 1fr; } }
  .frm label { display: block; }
  .frm .klabel { margin-bottom: 5px; display: block; }
  .frm input, .frm select, .frm textarea {
    width: 100%; padding: 8px 11px; border: 1px solid var(--line-strong); border-radius: 9px;
    background: var(--bg); color: var(--ink); font: 13.5px/1.5 var(--sans);
  }
  .frm textarea { resize: vertical; min-height: 64px; }
  .frm textarea.tall { min-height: 130px; }
  .frm input:focus, .frm select:focus, .frm textarea:focus { outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent); border-color: var(--accent); }
  .frm-foot { display: flex; justify-content: flex-end; gap: 9px; margin-top: 6px; }

  /* ---------- Lists / tables ---------- */
  .rowline { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--line); }
  .rowline:last-child { border-bottom: none; }
  .rowline .grow { flex: 1; min-width: 0; }
  .rowline .t { font-weight: 650; font-size: 14px; line-height: 1.35; }
  .rowline .s { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .daygroup { margin-bottom: 6px; }
  .daygroup > .klabel { display: block; padding: 12px 4px 4px; }

  table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { font-family: var(--mono); font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line-strong); white-space: nowrap; }
  .tbl td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl input.mx { width: 76px; padding: 5px 8px; border: 1px solid var(--line-strong); border-radius: 7px; background: var(--bg); color: var(--ink); font: 12.5px var(--mono); text-align: right; }
  .rate { font-family: var(--mono); font-size: 12.5px; font-weight: 700; }
  .rate.good { color: var(--green); } .rate.mid { color: var(--amber); } .rate.low { color: var(--muted); }
  .tblwrap { overflow-x: auto; }

  .hookline { display: flex; gap: 12px; align-items: flex-start; padding: 13px 4px; border-bottom: 1px solid var(--line); }
  .hookline:last-child { border-bottom: none; }
  .hookline .txt { flex: 1; font-family: var(--serif); font-size: 15.5px; line-height: 1.45; }
  .hookline .meta { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  .hstat { font-family: var(--mono); font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; border: 1px solid var(--line-strong); border-radius: 20px; padding: 2px 9px; cursor: pointer; background: none; color: var(--muted); }
  .hstat.winner { color: var(--green); border-color: color-mix(in srgb, var(--green) 45%, transparent); background: var(--green-soft); }
  .hstat.testing { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 45%, transparent); background: var(--amber-soft); }
  .hstat.retired { text-decoration: line-through; opacity: .6; }

  .comp { display: flex; gap: 14px; padding: 15px 4px; border-bottom: 1px solid var(--line); align-items: flex-start; }
  .comp:last-child { border-bottom: none; }
  .comp .mono-n { font-family: var(--mono); font-size: 13px; font-weight: 700; white-space: nowrap; min-width: 74px; text-align: right; color: var(--accent-ink); }
  .comp .nm { font-weight: 700; font-size: 14.5px; }
  .comp .lane { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .comp .gap { font-size: 13px; margin-top: 7px; padding: 8px 11px; background: var(--panel-2); border-left: 2px solid var(--accent); border-radius: 0 8px 8px 0; }
  .comp .gap b { color: var(--accent-ink); }

  .trend { padding: 16px 20px; }
  .trend .d { font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .heat { display: inline-flex; gap: 2px; }
  .heat i { width: 5px; height: 11px; border-radius: 2px; background: var(--line-strong); }
  .heat[data-h="3"] i, .heat[data-h="2"] i:nth-child(-n+2), .heat[data-h="1"] i:first-child { background: var(--accent); }
  .trend h3 { font-family: var(--serif); font-size: 18px; margin: 8px 0 6px; line-height: 1.3; }
  .trend p { margin: 0; font-size: 13.5px; color: var(--ink); }
  .trend .angle { margin-top: 10px; font-size: 13px; padding: 9px 12px; background: var(--accent-soft); border-radius: 9px; }
  .trend .angle b { color: var(--accent-ink); font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; margin-right: 6px; }
  .trend .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .trend .src { font-size: 11.5px; color: var(--muted); }

  /* ---------- Thesis Engine ---------- */
  .sig { background: linear-gradient(180deg, var(--accent-soft), var(--panel)); border-color: color-mix(in srgb, var(--accent) 30%, var(--line)); }
  .sig .big { font-family: var(--serif); font-size: 19px; line-height: 1.5; }
  .sig .big em { color: var(--accent); font-style: italic; }
  .sig .big strong { font-weight: 700; }
  .thesis-card { padding: 20px 22px; margin-top: 14px; }
  .th-top { display: flex; gap: 14px; align-items: center; }
  .th-n { font-family: var(--serif); font-size: 24px; font-weight: 700; color: var(--accent-ink); width: 46px; height: 46px; border-radius: 12px; background: var(--accent-soft); display: grid; place-items: center; flex: 0 0 auto; }
  .th-name { font-family: var(--serif); font-size: 21px; font-weight: 700; line-height: 1.15; }
  .th-claim { font-size: 16px; line-height: 1.55; margin: 15px 0 2px; }
  .th-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
  @media (max-width: 640px) { .th-split { grid-template-columns: 1fr; } }
  .th-opt, .th-ref { padding: 12px 14px; border-radius: 11px; font-size: 13px; }
  .th-opt { background: var(--green-soft); }
  .th-ref { background: var(--panel-2); border: 1px solid var(--line); }
  .th-opt p, .th-ref p { margin: 6px 0 0; line-height: 1.55; }
  .th-opt .klabel { color: var(--green); }
  .th-angles { margin: 4px 0 6px; }
  .th-angle { display: flex; gap: 14px; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; line-height: 1.45; }
  .th-angle:last-child { border-bottom: none; }
  .th-angle button { flex: 0 0 auto; }
  .th-src { font-size: 12.5px; color: var(--muted); padding-top: 13px; margin-top: 4px; border-top: 1px solid var(--line); }
  .th-src a { font-family: var(--mono); font-size: 11.5px; }

  .note { font-size: 12px; color: var(--muted); font-style: italic; }
  .spark { display: block; }
  .empty { text-align: center; color: var(--muted); padding: 46px 20px; font-size: 14px; }
  .empty .big { font-family: var(--serif); font-size: 19px; color: var(--ink); margin-bottom: 6px; }

  #toast {
    position: fixed; bottom: 26px; left: 50%; transform: translate(-50%, 20px); opacity: 0;
    background: var(--ink); color: var(--bg); font-size: 13px; font-weight: 600; padding: 9px 18px;
    border-radius: 22px; pointer-events: none; transition: all .2s; z-index: 90;
  }
  #toast.show { opacity: 1; transform: translate(-50%, 0); }

  .weekbar { display: flex; gap: 6px; align-items: center; }
  .weekbar .seg { height: 8px; flex: 1; border-radius: 4px; background: var(--line); }
  .weekbar .seg.f { background: var(--accent); }
  .weekbar .seg.f.g { background: var(--green); }

  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .sidebar { position: static; height: auto; flex: none; border-right: none; border-bottom: 1px solid var(--line); padding: 18px 16px 12px; gap: 14px; }
    nav { flex-direction: row; overflow-x: auto; gap: 4px; padding-bottom: 4px; }

      script: 'Talking head, selfie cam, ~50s. Pin this to the profile.\n\n0–3s — HOOK: “Everyone online is selling you tech fear. I’m here to sell you leverage.”\n3–18s — The stance: I’m a political scientist who researches chips, AI, and who controls technology. And I’m an optimist — not the naive kind, the kind that reads the auditor reports anyway.\n18–38s — Four things I’ll argue here: (1) openness beats ownership — Europe’s edge is open standards, not copying NVIDIA. (2) Fit beats firepower — policy works when it matches the state, not when it spends the most. (3) Mind the accountability gap — with autonomous tech the danger is the empty chair, not the machine. (4) Responsibility stays human — AI can’t be blamed, and that’s the good news.\n38–50s — CTA: “Optimistic, sourced, and willing to argue with itself. Follow if that’s your kind of tech account.”',

      hook: 'Europe keeps trying to build its own NVIDIA. The winning move is to make NVIDIA optional.',
      script: '9 slides, 4:5. Flagship thesis carousel — based on my RISC-V paper.\n\nSlide 1 — HOOK: “Europe keeps trying to build its own NVIDIA. The winning move is to make NVIDIA optional.”\nSlide 2 — In this carousel: why open chip standards are a sovereignty strategy, not a hobby.\nSlide 3 — The trap: AI runs on NVIDIA GPUs + CUDA. That lock-in is what lets one company — and one government — decide who gets to compute. Economists call it weaponized interdependence.\nSlide 4 — The lever: RISC-V, an OPEN instruction set. Anyone can build a chip on it, license-free. No single owner, no export-control kill switch on the standard itself.\nSlide 5 — Why it rebalances power: open standards cut switching costs. They let Europe — and everyone else — stop being a hostage to one proprietary stack.\nSlide 6 — The optimistic read: Europe’s exit ramp from dependence already exists. Backing open silicon is faster and cheaper than cloning TSMC.\nSlide 7 — The honest read: openness helps rivals too, including China. Leverage from standards is shared, not owned — and only real if Europe backs it consistently.\nSlide 8 — What that means for policy: fund open-hardware ecosystems, not just fabs. Indispensability through openness — own the standard’s momentum, not a walled garden.\nSlide 9 — CTA: “This is from my own research — full paper linked in bio. Save it for the next ‘Europe can’t compete in chips’ take.”',

      hook: 'The scary part of autonomous AI isn’t the machine. It’s the empty chair where responsibility should sit.',
      script: 'Talking head, ~60s. Responsible Tech pillar — optimistic but serious.\n\n0–3s — HOOK: “The scary part of autonomous AI isn’t the machine. It’s the empty chair where responsibility should sit.”\n3–20s — The real problem: when a system acts on its own — a drone, a trading bot, a hiring filter — technology races ahead of the question ‘who answers for this?’ That’s the accountability gap.\n20–38s — Why the easy answers fail: banning autonomy outright is politically unrealistic. Adopting it blind is reckless. Both dodge the actual work.\n38–52s — The closeable version: meaningful human control + strict liability. Keep a human genuinely in the loop, and make sure someone is legally answerable. Then autonomy is an asset, not a loophole.\n52–60s — CTA: “Regulation as an enabler, not a brake. From my research on autonomous systems — more in the Thesis Engine. Follow for responsible-tech takes that don’t doom-post.”',

      hook: 'The Chips Act didn’t fail for lack of money. It failed for lack of fit.',
      script: '8 slides. Based on my Taiwan–Germany semiconductor-policy paper.\n\nSlide 1 — HOOK: “The Chips Act didn’t fail for lack of money. It failed for lack of fit.”\nSlide 2 — In this carousel: why identical policy tools succeed in Taiwan and stall in Germany.\nSlide 3 — The frame: governments have three levers — information, authority, and money (political scientists call it the NATO toolkit). Everyone reaches for money. Few ask whether their state can actually wield it.\nSlide 4 — Taiwan: corporatist synergy. Tight state–industry coordination means a subsidy lands fast and aligned. The tool fits the hand.\nSlide 5 — Germany: decentralized agility. Federal, deliberative, slower to concentrate force — but flexible. Same subsidy, different physics.\nSlide 6 — The thesis: policy effectiveness depends on matching tools to administrative capacity — not on piling up more instruments. Fit over firepower.\nSlide 7 — Optimistic read: Europe doesn’t need to out-spend anyone; it needs to play to its own institutional strengths. Reflective read: capacity is slow to build and can’t be imported.\nSlide 8 — CTA: “Next time a chip subsidy is announced, ask ‘does the state fit the tool?’ From my own research — paper linked in bio.”',

      script: 'Talking head, ~55s. Reflective + optimistic.\n\n0–3s — HOOK: “AI can’t be blamed. That’s not a loophole — it’s the whole point.”\n3–18s — The philosophy, fast: blame and thanks need a moral agent — someone with intentions and goodwill. We thank a nurse; we don’t thank a defibrillator. AI is the defibrillator.\n18–35s — So here’s the move: responsibility never transfers to the system. It stays, fully, with the people who build and deploy it. “The algorithm did it” isn’t an excuse — accountability always has an address.\n35–48s — The reflective flip side: that also means we can’t offload the hard moral calls to AI. The comfort of ‘the system decided’ isn’t available to us — and honestly, it shouldn’t be.\n48–55s — CTA: “Responsible AI starts by refusing to pretend the AI is the responsible one. From my work on moral agency — linked in bio.”',

/* ============================== State ============================== */

const LS_KEY = 'sovereignty-studio-v1';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s && Array.isArray(s.posts)) return s;
    }
  } catch (e) { /* corrupted storage falls back to seed */ }
  return JSON.parse(JSON.stringify(SEED));
}
function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {} }
function resetData() {
  if (!confirm('Reset the studio to the seeded launch plan? Your edits will be lost.')) return;
  localStorage.removeItem(LS_KEY);
  state = JSON.parse(JSON.stringify(SEED));
  closeOverlays(); render(); toast('Seed data restored');
}

/* ============================== Helpers ============================== */

const $ = (sel, el) => (el || document).querySelector(sel);
const esc = s => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
const uid = () => 'p-' + Math.random().toString(36).slice(2, 9);
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const STATUSES = ['draft', 'ready', 'scheduled', 'posted'];
const HOOK_STATUSES = ['untested', 'testing', 'winner', 'retired'];

function todayStr() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtDate(s) { const d = parseDate(s); return MONTHS[d.getMonth()].slice(0,3) + ' ' + d.getDate() + ', ' + d.getFullYear(); }
function fmtDow(s) { const d = parseDate(s); return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]; }
function fmtTime(t) { if (!t) return ''; const [h,m] = t.split(':').map(Number); const am = h < 12; const hh = h % 12 || 12; return hh + ':' + String(m).padStart(2,'0') + (am ? 'a' : 'p'); }
function byId(id) { return state.posts.find(p => p.id === id); }
function sortPosts(arr) { return arr.slice().sort((a,b) => (a.date + (a.time||'')) < (b.date + (b.time||'')) ? -1 : 1); }
function pct(n, d) { return d > 0 ? (100 * n / d) : null; }
function fmtPct(v) { return v == null ? '—' : v.toFixed(1) + '%'; }
function rateClass(v, good, mid) { return v == null ? 'low' : v >= good ? 'good' : v >= mid ? 'mid' : 'low'; }

function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._h); toast._h = setTimeout(() => t.classList.remove('show'), 1800);
}
function copyText(text, label) {
  const done = () => toast((label || 'Copied') + ' to clipboard');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, () => fallbackCopy(text, done));
  } else fallbackCopy(text, done);
}
function fallbackCopy(text, done) {
  const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); done(); } catch (e) { toast('Copy failed'); }
  document.body.removeChild(ta);
}

/* ============================== Overview ============================== */

function weekRange(base) {
  const d = new Date(base); const day = d.getDay(); const mon = new Date(d); mon.setDate(d.getDate() - ((day + 6) % 7));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const f = x => x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0');
  return [f(mon), f(sun)];
}

function renderOverview() {
  const now = new Date();
  const hour = now.getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
  const today = todayStr();
  const [wStart, wEnd] = weekRange(now);
  const week = sortPosts(state.posts.filter(p => p.date >= wStart && p.date <= wEnd));
  const upcoming = sortPosts(state.posts.filter(p => p.date >= today && p.status !== 'posted'));
  const next = upcoming[0];
  const queued = state.posts.filter(p => p.status === 'scheduled' || p.status === 'ready').length;
  const testing = state.hooks.filter(h => h.status === 'testing').length;
  const posted = state.posts.filter(p => p.status === 'posted' && p.metrics);

  const weekReels = week.filter(p => p.format === 'Reel').length;

      queued + ' posts queued · ' + testing + ' hooks in testing · next up: ' + (next ? esc(next.title) : 'nothing scheduled'),
      '<a class="btn primary" href="#/calendar" data-action="new-post-link">+ New post</a>') +

    '<div class="grid cols-4">' +
      '<div class="card pad"><div class="klabel">Queued</div><div class="stat-n">' + queued + '</div><div class="stat-s">ready or scheduled</div></div>' +
      '<div class="card pad"><div class="klabel">Hooks heating</div><div class="stat-n">' + testing + '</div><div class="stat-s">in Trial-Reel testing</div></div>' +
      '<div class="card pad"><div class="klabel">Sends / reach</div><div class="stat-n">' + fmtPct(spr) + '</div><div class="stat-s">north-star metric · all posted</div></div>' +
      '<div class="card pad"><div class="klabel">Published</div><div class="stat-n">' + posted.length + '</div><div class="stat-s">since soft launch Jul 15</div></div>' +

/* ============================== Calendar ============================== */

let calY, calM;
(function initCal() { const d = new Date(); calY = d.getFullYear(); calM = d.getMonth(); })();

function renderCalendar() {
  const first = new Date(calY, calM, 1);
  const startOffset = first.getDay(); // Sunday-first, like the reference
  const daysInMonth = new Date(calY, calM + 1, 0).getDate();
  const monthPosts = state.posts.filter(p => { const d = parseDate(p.date); return d.getFullYear() === calY && d.getMonth() === calM; });
  const platforms = [...new Set(monthPosts.map(p => p.platform))].length;
  const today = todayStr();

  let cells = '';
  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startOffset + 1;
    if (dayNum < 1 || dayNum > daysInMonth) { cells += '<div class="cal-cell out"></div>'; continue; }
    const ds = calY + '-' + String(calM+1).padStart(2,'0') + '-' + String(dayNum).padStart(2,'0');
    const slots = sortPosts(monthPosts.filter(p => p.date === ds));
    cells += '<div class="cal-cell' + (ds === today ? ' today' : '') + '">' +
      '<span class="dnum">' + dayNum + '</span>' +
      slots.map(p =>
        '<div class="slot ' + p.format.toLowerCase() + '" data-action="open-post" data-id="' + p.id + '" title="' + esc(p.title) + '">' +
          '<b>' + fmtTime(p.time) + ' ' + esc(p.format.toUpperCase()) + ' · ' + esc(p.platform) + '</b>' +
          '<span class="hk">' + esc(p.hook) + '</span>' +
        '</div>').join('') +
      '</div>';
  }

  return pageHead('Content Calendar', 'Everything, <em>scheduled.</em>',
      'Monthly view of the pipeline. Every slot carries the exact date and time, the platform, and the hook — click any slot for the full script and caption.',
      '<button class="btn primary" data-action="new-post">+ New post</button>') +
    '<div class="cal-toolbar">' +
      '<div class="cal-nav">' +
        '<button class="btn sm" data-action="cal-prev">←</button>' +
        '<span class="cal-month">' + MONTHS[calM] + ' ' + calY + '</span>' +
        '<button class="btn sm" data-action="cal-next">→</button>' +
        '<button class="btn sm ghost" data-action="cal-today">Today</button>' +
      '</div>' +
      '<div class="cal-meta">' + monthPosts.length + ' items · ' + platforms + ' platform' + (platforms === 1 ? '' : 's') + ' · everything scheduled</div>' +
    '</div>' +
    '<div class="cal"><div class="cal-head">' + DOW.map(d => '<div>' + d + '</div>').join('') + '</div>' +
    '<div class="cal-grid">' + cells + '</div></div>' +
    '<div class="legend">' +
      '<span><i style="background:var(--accent)"></i>Reel</span>' +
      '<span><i style="background:var(--green)"></i>Carousel</span>' +
      '<span><i style="background:var(--amber)"></i>Story</span>' +
      '<span class="note">Best-time defaults: 7:30a weekday Reels, 8:00a carousels, 5:00p second slots.</span>' +
    '</div>';
}

function submitEditor(form) {
  const fd = new FormData(form);
  const id = form.dataset.id;
  const vals = {};
  ['title','date','time','platform','format','pillar','status','series','hook','script','caption','hashtags','thesis'].forEach(k => vals[k] = String(fd.get(k) || '').trim());
  if (!vals.title || !vals.date) return;
  if (id) {
    const p = byId(id); if (!p) return;
    Object.assign(p, vals);
  } else {
    vals.id = uid(); vals.metrics = null;
    state.posts.push(vals);
  }
  save(); closeOverlays(); render();
  toast(id ? 'Post updated' : 'Added to calendar');
}

/* ============================== Hook Vault ============================== */

function renderHooks() {
  const cats = [...new Set(state.hooks.map(h => h.category))];
  const order = { winner: 0, testing: 1, untested: 2, retired: 3 };
  return pageHead('Hook Vault', 'The first three seconds, <em>stockpiled.</em>',
      'Viewers decide in a quarter second. Bank hooks here, run them through Trial Reels against non-followers, promote the winners. Click a status to advance it.',
      '') +
    '<div class="card pad">' +
      '<form class="frm" id="hookForm" style="grid-template-columns: 1fr 170px auto; display:grid; gap:10px; align-items:end;">' +
        '<label><span class="klabel">New hook</span><input name="text" required placeholder="The one number Brussels hopes you never compare…"></label>' +
        '<label><span class="klabel">Category</span><select name="category">' +
          ['Thesis','Responsibility','Information gap','Numbers','Myth vs. Reality','Newsjack','Analogy','Absurdity','Series retention'].map(c => '<option>' + c + '</option>').join('') +
        '</select></label>' +
        '<button type="submit" class="btn primary">Add</button>' +
      '</form>' +
    '</div>' +
    cats.map(cat => {
      const hooks = state.hooks.filter(h => h.category === cat).sort((a,b) => order[a.status] - order[b.status]);
      return '<div class="card pad" style="margin-top:14px;">' +
        '<div class="klabel" style="margin-bottom:4px;">' + esc(cat) + ' · ' + hooks.length + '</div>' +
        hooks.map(h =>
          '<div class="hookline">' +
            '<div class="txt">“' + esc(h.text) + '”' +
              '<div class="meta">' +
                '<button class="hstat ' + h.status + '" data-action="cycle-hook" data-id="' + h.id + '" title="Click to advance: untested → testing → winner → retired">' + h.status + '</button>' +
                (h.notes ? '<span class="note">' + esc(h.notes) + '</span>' : '') +
              '</div>' +
            '</div>' +
            '<button class="copybtn" data-action="copy-hook" data-id="' + h.id + '">Copy</button>' +
            '<button class="copybtn" data-action="delete-hook" data-id="' + h.id + '" title="Remove hook">✕</button>' +
          '</div>').join('') +
        '</div>';
    }).join('');
}

/* ============================== Scheduler ============================== */

function renderScheduler() {
  const today = todayStr();
  const horizon = new Date(); horizon.setDate(horizon.getDate() + 14);
  const hEnd = horizon.getFullYear() + '-' + String(horizon.getMonth()+1).padStart(2,'0') + '-' + String(horizon.getDate()).padStart(2,'0');
  const upcoming = sortPosts(state.posts.filter(p => p.date >= today && p.date <= hEnd));
  const backlog = sortPosts(state.posts.filter(p => p.date > hEnd && p.status !== 'posted'));
  const days = [...new Set(upcoming.map(p => p.date))];

  const row = p =>
    '<div class="rowline">' +
      '<div class="klabel" style="min-width:52px;">' + fmtTime(p.time) + '</div>' +
      '<div class="grow"><div class="t">' + esc(p.title) + '</div><div class="s">' + esc(p.hook) + '</div></div>' +
      '<span class="pill ' + p.format.toLowerCase() + '">' + esc(p.format) + '</span>' +
      statusPill(p) +
      '<button class="btn sm ghost" data-action="open-post" data-id="' + p.id + '">Open</button>' +
    '</div>';

  return pageHead('Scheduler', 'The next <em>fourteen days.</em>',
      'The publish queue, day by day. Advance a post through draft → ready → scheduled → posted by clicking its status. The first 20 minutes after publishing decide the early signal — be online when it drops.',
      '<button class="btn primary" data-action="new-post">+ New post</button>') +
    '<div class="card" style="padding: 6px 20px 10px;">' +
      (days.length ? days.map(d =>
        '<div class="daygroup"><span class="klabel">' + fmtDow(d) + ' · ' + fmtDate(d) + (d === today ? ' · TODAY' : '') + '</span>' +
        upcoming.filter(p => p.date === d).map(row).join('') + '</div>').join('') :
        '<div class="empty"><div class="big">Queue is empty.</div>Add posts from the calendar or the trend radar.</div>') +
    '</div>' +
    (backlog.length ?
      '<div class="card" style="padding: 6px 20px 10px; margin-top:14px;">' +
        '<div class="daygroup"><span class="klabel">Beyond 14 days · ' + backlog.length + ' queued</span>' + backlog.map(row).join('') + '</div>' +
      '</div>' : '');
}

/* ============================== Analytics ============================== */

function renderAnalytics() {
  const posted = sortPosts(state.posts.filter(p => p.status === 'posted'));
  const withM = posted.filter(p => p.metrics);
  const totReach = withM.reduce((s,p) => s + (p.metrics.reach||0), 0);
  const totSends = withM.reduce((s,p) => s + (p.metrics.sends||0), 0);
  const totSaves = withM.reduce((s,p) => s + (p.metrics.saves||0), 0);
  const spr = pct(totSends, totReach), svr = pct(totSaves, totReach);

  const points = withM.map(p => pct(p.metrics.sends, p.metrics.reach) || 0);
  let spark = '';
  if (points.length > 1) {
    const w = 280, hgt = 54, max = Math.max(...points, 2.5);
    const xy = points.map((v, i) => [(i / (points.length - 1)) * (w - 8) + 4, hgt - 6 - (v / max) * (hgt - 14)]);
    const path = xy.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
    spark = '<svg class="spark" width="' + w + '" height="' + hgt + '" viewBox="0 0 ' + w + ' ' + hgt + '" aria-label="Sends per reach trend">' +
      '<path d="' + path + '" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>' +
      xy.map(p => '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="3" fill="var(--accent)"/>').join('') +
      '</svg>';
  }

  return pageHead('Analytics', 'Chase sends, <em>not likes.</em>',
      'Log reach, likes, sends, and saves per post straight from Instagram Insights — the studio computes the ratios that actually drive 2026 distribution. Directional benchmarks: sends/reach ≥ 1% is strong, saves/reach ≥ 2% is strong.',
      '') +
    '<div class="grid cols-3">' +
      '<div class="card pad"><div class="klabel">Sends / reach</div><div class="stat-n">' + fmtPct(spr) + '</div><div class="stat-s">north star · all posted content</div></div>' +
      '<div class="card pad"><div class="klabel">Saves / reach</div><div class="stat-n">' + fmtPct(svr) + '</div><div class="stat-s">authority signal</div></div>' +
      '<div class="card pad"><div class="klabel">Trend</div>' + (spark || '<div class="stat-s" style="margin-top:12px;">Log two or more posts to see the sends-per-reach curve.</div>') + '<div class="stat-s">sends/reach per post, oldest → newest</div></div>' +
    '</div>' +
    '<div class="card" style="margin-top:14px; padding: 14px 16px;">' +
      (posted.length ?
        '<div class="tblwrap"><table class="tbl"><thead><tr>' +
        '<th>Post</th><th>Date</th><th>Format</th><th>Reach</th><th>Likes</th><th>Sends</th><th>Saves</th><th>Sends/Reach</th><th>Saves/Reach</th>' +
        '</tr></thead><tbody>' +
        posted.map(p => {
          const m = p.metrics || {};
          const sp = pct(m.sends, m.reach), sv = pct(m.saves, m.reach);
          const cell = (f, v) => '<td><input class="mx" data-action-input="metric" data-id="' + p.id + '" data-f="' + f + '" type="number" min="0" value="' + (v == null ? '' : v) + '" placeholder="–"></td>';
          return '<tr>' +
            '<td style="max-width:280px;"><div style="font-weight:650; line-height:1.3;">' + esc(p.title) + '</div></td>' +
            '<td style="white-space:nowrap;" class="klabel">' + fmtDate(p.date) + '</td>' +
            '<td><span class="pill ' + p.format.toLowerCase() + '">' + esc(p.format) + '</span></td>' +
            cell('reach', m.reach) + cell('likes', m.likes) + cell('sends', m.sends) + cell('saves', m.saves) +
            '<td><span class="rate ' + rateClass(sp, 1, 0.5) + '">' + fmtPct(sp) + '</span></td>' +
            '<td><span class="rate ' + rateClass(sv, 2, 1) + '">' + fmtPct(sv) + '</span></td>' +
          '</tr>';
        }).join('') +
        '</tbody></table></div>' +
        '<div class="note" style="margin-top:10px;">Seeded rows carry sample values — replace them with your real Instagram Insights. Mark a post as “posted” in the scheduler to add it here.</div>' :
        '<div class="empty"><div class="big">No published posts yet.</div>Once a post goes live, mark it “posted” and log its Insights here.</div>') +
    '</div>';
}

/* ============================== Competitor Tracker ============================== */

function renderCompetitors() {
  const tiers = [...new Set(state.competitors.map(c => c.tier))];
  return pageHead('Competitor Tracker', 'Know the map, <em>own the gap.</em>',
      'The competitive field as of mid-2026: chip authorities are long-form, geopolitics accounts are generalists, institutions are faceless — and nobody does carousel-grade tech policy. Verify follower counts before citing them publicly.',
      '') +
    tiers.map(tier =>
      '<div class="card pad" style="margin-bottom:14px;">' +
        '<div class="klabel" style="margin-bottom:4px;">' + esc(tier) + '</div>' +
        state.competitors.filter(c => c.tier === tier).map(c =>
          '<div class="comp">' +
            '<div class="mono-n">' + esc(c.followers) + '</div>' +
            '<div style="flex:1; min-width:0;">' +
              '<div class="nm">' + esc(c.name) + ' <span class="klabel" style="font-size:9.5px;">· ' + esc(c.platform) + ' · ' + esc(c.handle) + '</span></div>' +
              '<div class="lane">' + esc(c.lane) + '</div>' +
              '<div class="gap"><b>Your edge:</b> ' + esc(c.gap) + '</div>' +
            '</div>' +
          '</div>').join('') +
      '</div>').join('') +
    '<div class="note">Source: competitive scan, July 2026 playbook. Counts vary by source and date.</div>';
}

/* ============================== What's Trending ============================== */

function renderTrending() {
  const trends = state.trends.slice().sort((a,b) => b.heat - a.heat || (a.date < b.date ? 1 : -1));
  return pageHead('What’s Trending', 'The story pipeline, <em>pre-sorted.</em>',
      'Live storylines on the beat, each with a ready newsjack angle. The rapid-response rule: a Commission proposal, a BIS rule, or an earnings call becomes a carousel within 24–48 hours. “Draft it” drops a pre-filled post into your calendar.',
      '<a class="btn" href="../" target="_blank" rel="noopener">Daily Top 5 →</a>') +
    '<div class="grid" style="grid-template-columns: 1fr 1fr;">' +
    trends.map(t =>
      '<div class="card trend">' +
        '<div class="d"><span class="heat" data-h="' + t.heat + '"><i></i><i></i><i></i></span>' +
          '<span>' + esc(t.topic) + '</span><span>·</span><span>' + fmtDate(t.date) + '</span></div>' +
        '<h3>' + esc(t.title) + '</h3>' +
        '<p>' + esc(t.summary) + '</p>' +
        '<div class="angle"><b>Angle</b>' + esc(t.angle) + '</div>' +
        '<div class="foot"><span class="src">' + esc(t.source) + '</span>' +
          '<button class="btn sm" data-action="draft-trend" data-id="' + t.id + '">Draft it →</button></div>' +
      '</div>').join('') +
    '</div>' +
    '<style>@media (max-width: 860px){ #main .grid[style] { grid-template-columns: 1fr !important; } }</style>';
}

function draftFromTrend(id) {
  const t = state.trends.find(x => x.id === id); if (!t) return;
  const d = new Date(); d.setDate(d.getDate() + 1);
  const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  openEditor(null, {
    date: ds, time: '08:00', format: 'Carousel', pillar: 'Newsjack', status: 'draft',
    title: t.title, hook: '', script: 'Angle: ' + t.angle + '\n\nSummary: ' + t.summary + '\n\nSource: ' + t.source + '\n\nSlide 1 — HOOK:\nSlide 2 — What this covers:\nSlide 3 — …',
    caption: 'Sources: ' + t.source + '.', hashtags: '#techpolicy'
  });
}

/* ============================== Thesis Engine ============================== */

function renderTheses() {
  return pageHead('Thesis Engine', 'Your arguments, <em>on the record.</em>',
      'The standing arguments that make this account yours — drawn from your own research, each with an optimistic read and an honest counter-read. Substance is the moat: lead with theses, cite named sources, and every angle here drops straight into the calendar.',
      '') +
    '<div class="card pad sig">' +
      '<div class="klabel" style="margin-bottom:8px;">Signature stance</div>' +
      '<div class="big"><strong>Optimistic sovereignty.</strong> Europe’s edge isn’t fear or fortress-building — it’s <em>leverage through openness, institutional fit, and keeping humans accountable.</em> Positive by default, reflective on purpose: every thesis below carries its own honest counter-argument.</div>' +
    '</div>' +
    state.theses.map(t => {
      const n = state.posts.filter(p => p.thesis === t.id).length;
      return '<div class="card thesis-card">' +
        '<div class="th-top"><span class="th-n">' + esc(t.n) + '</span>' +
          '<div><div class="th-name">' + esc(t.name) + '</div>' +
          '<div class="klabel" style="margin-top:3px;">' + (n ? n + ' post' + (n === 1 ? '' : 's') + ' in the pipeline advance this' : 'no posts yet — draft one below') + '</div></div></div>' +
        '<p class="th-claim">' + esc(t.claim) + '</p>' +
        '<div class="th-split">' +
          '<div class="th-opt"><div class="klabel">✦ Optimistic read</div><p>' + esc(t.optimistic) + '</p></div>' +
          '<div class="th-ref"><div class="klabel">◑ Reflective read</div><p>' + esc(t.reflective) + '</p></div>' +
        '</div>' +
        '<div class="th-angles"><div class="klabel" style="margin-bottom:2px;">Content angles</div>' +
          t.angles.map((a, i) => '<div class="th-angle"><span>' + esc(a) + '</span>' +
            '<button class="btn sm" data-action="draft-thesis" data-id="' + t.id + '" data-i="' + i + '">Draft it →</button></div>').join('') +
        '</div>' +
        '<div class="th-src">Source · <em>' + esc(t.paper) + '</em> · ' +
          '<a href="https://doi.org/' + esc(t.doi) + '" target="_blank" rel="noopener">' + esc(t.doi) + '</a></div>' +
      '</div>';
    }).join('');
}

function draftFromThesis(id, i) {
  const t = state.theses.find(x => x.id === id); if (!t) return;
  const angle = t.angles[Number(i)] || '';
  const d = new Date(); d.setDate(d.getDate() + 1);
  const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const isReel = /reel|hot take/i.test(angle);
  const responsibility = (id === 'th-gap' || id === 'th-human');
  openEditor(null, {
    date: ds, time: isReel ? '17:00' : '08:00', format: isReel ? 'Reel' : 'Carousel',
    pillar: responsibility ? 'Responsibility' : 'Thesis', status: 'draft',
    series: responsibility ? 'Responsible Tech' : 'The Thesis', thesis: id,
    title: t.name + ' — ' + (isReel ? 'reel' : 'carousel'),
    hook: '',
    script: 'THESIS: ' + t.claim + '\n\nAngle: ' + angle + '\n\nOptimistic beat: ' + t.optimistic + '\n\nReflective beat: ' + t.reflective + '\n\nSlide 1 — HOOK:\nSlide 2 — …',
    caption: 'Based on my research: ' + t.paper + ' (' + t.doi + ').',
    hashtags: responsibility ? '#AIresponsibility #techpolicy #techoptimism' : '#techpolicy #digitalsovereignty #techoptimism'
  });
}

/* ============================== Events ============================== */

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const a = el.dataset.action, id = el.dataset.id;
  if (a === 'close-overlays') closeOverlays();
  else if (a === 'open-post') openPost(id);
  else if (a === 'new-post') openEditor(null);
  else if (a === 'new-post-link') { /* navigates to calendar */ setTimeout(() => openEditor(null), 60); }
  else if (a === 'edit-post') openEditor(id);
  else if (a === 'delete-post') {
    const p = byId(id); if (!p) return;
    if (confirm('Delete “' + p.title + '”?')) {
      state.posts = state.posts.filter(x => x.id !== id);
      save(); closeOverlays(); render(); toast('Post deleted');
    }
  }
  else if (a === 'cycle-status') {
    const p = byId(id); if (!p) return;
    p.status = STATUSES[(STATUSES.indexOf(p.status) + 1) % STATUSES.length];
    if (p.status === 'posted' && !p.metrics) p.metrics = { reach: null, likes: null, sends: null, saves: null };
    save(); render();
    if ($('#panel').classList.contains('open')) openPost(id);
  }
  else if (a === 'copy-field') { const p = byId(id); if (p) copyText(p[el.dataset.f] || '', el.dataset.f.charAt(0).toUpperCase() + el.dataset.f.slice(1)); }
  else if (a === 'copy-all') { const p = byId(id); if (p) copyText(p.script + '\n\n---\n\n' + p.caption + '\n\n' + p.hashtags, 'Script + caption'); }
  else if (a === 'cycle-hook') {
    const h = state.hooks.find(x => x.id === id); if (!h) return;
    h.status = HOOK_STATUSES[(HOOK_STATUSES.indexOf(h.status) + 1) % HOOK_STATUSES.length];
    save(); render();
  }
  else if (a === 'copy-hook') { const h = state.hooks.find(x => x.id === id); if (h) copyText(h.text, 'Hook'); }
  else if (a === 'delete-hook') {
    const h = state.hooks.find(x => x.id === id); if (!h) return;
    if (confirm('Remove this hook from the vault?')) { state.hooks = state.hooks.filter(x => x.id !== id); save(); render(); }
  }
  else if (a === 'draft-trend') draftFromTrend(id);
  else if (a === 'draft-thesis') draftFromThesis(id, el.dataset.i);
  else if (a === 'cal-prev') { calM--; if (calM < 0) { calM = 11; calY--; } render(); }
  else if (a === 'cal-next') { calM++; if (calM > 11) { calM = 0; calY++; } render(); }
  else if (a === 'cal-today') { const d = new Date(); calY = d.getFullYear(); calM = d.getMonth(); render(); }
  else if (a === 'reset-data') resetData();
});

document.addEventListener('submit', e => {
  if (e.target.id === 'postForm') { e.preventDefault(); submitEditor(e.target); }
  if (e.target.id === 'hookForm') {
    e.preventDefault();
    const fd = new FormData(e.target);
    const text = String(fd.get('text') || '').trim();
    if (!text) return;
    state.hooks.push({ id: uid(), text, category: String(fd.get('category')), status: 'untested', notes: '' });
    save(); render(); toast('Hook added to vault');
  }
});

document.addEventListener('input', e => {
  const el = e.target.closest('[data-action-input="metric"]');
  if (!el) return;
  const p = byId(el.dataset.id); if (!p) return;
  if (!p.metrics) p.metrics = { reach: null, likes: null, sends: null, saves: null };
  const v = el.value === '' ? null : Math.max(0, Number(el.value));
  p.metrics[el.dataset.f] = v; save();
  // Recompute the two rate cells + summary without a full re-render (keeps input focus)
  const row = el.closest('tr');
  if (row) {
    const m = p.metrics;
    const rates = row.querySelectorAll('.rate');
    const sp = pct(m.sends, m.reach), sv = pct(m.saves, m.reach);
    if (rates[0]) { rates[0].textContent = fmtPct(sp); rates[0].className = 'rate ' + rateClass(sp, 1, 0.5); }
    if (rates[1]) { rates[1].textContent = fmtPct(sv); rates[1].className = 'rate ' + rateClass(sv, 2, 1); }
  }
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlays(); });

render();
</script>
</body>
</html>
