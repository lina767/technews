# Source registry — 4 tiers for a broad, primary-source-anchored data base.
#
# Each source: name, url, type (rss | federal_register_api), tier
# (primary | institute | secondary | newsletter), topics (tags), and an
# optional weight override. `tier` drives scoring: primary breaks stories and
# scores highest for credibility; secondary adds breadth and confirmation but
# only lowers a story's novelty rather than becoming "the new thing".
#
# Feed URLs are best-effort; the collector skips any that are unreachable, so a
# stale URL degrades gracefully. Swap in alternatives as feeds move.

sources:
  # ---- Tier 1: primary (official / institutional) --------------------------
  - name: EU Commission — Digital Strategy
    url: https://digital-strategy.ec.europa.eu/en/rss.xml
    type: rss
    tier: primary
    topics: [eu-ai-regulation, digital-sovereignty, eu-chips-act]

  - name: European Parliament — Press
    url: https://www.europarl.europa.eu/rss/doc/press-releases/en.xml
    type: rss
    tier: primary
    topics: [eu-ai-regulation, digital-sovereignty, us-tech-policy]

  - name: US Federal Register — Semiconductors
    url: ""
    type: federal_register_api
    query: semiconductor
    tier: primary
    topics: [semiconductor-industry, ai-industrial-policy, us-tech-policy]

  - name: US Federal Register — Artificial Intelligence
    url: ""
    type: federal_register_api
    query: artificial intelligence
    tier: primary
    topics: [us-tech-policy, ai-industrial-policy]

  - name: US Federal Register — Export Controls
    url: ""
    type: federal_register_api
    query: export control
    tier: primary
    topics: [us-tech-policy, semiconductor-industry]

  - name: The White House — Presidential Actions
    url: https://www.whitehouse.gov/presidential-actions/feed/
    type: rss
    tier: primary
    topics: [us-tech-policy, ai-industrial-policy]

  - name: UK DSIT — News
    url: https://www.gov.uk/government/organisations/department-for-science-innovation-and-technology.atom
    type: rss
    tier: primary
    topics: [eu-ai-regulation, digital-sovereignty, us-tech-policy]

  # ---- Tier 2: institutes & think tanks (primary-adjacent analysis) --------
  - name: Tech Policy Press
    url: https://news.google.com/rss/search?q=site:techpolicy.press&hl=en-US&gl=US&ceid=US:en
    type: rss
    tier: institute
    topics: [us-tech-policy, eu-ai-regulation, digital-sovereignty]

  - name: Bruegel
    url: https://www.bruegel.org/rss.xml
    type: rss
    tier: institute
    topics: [eu-chips-act, ai-industrial-policy, digital-sovereignty]

  - name: CSIS
    url: https://www.csis.org/rss.xml
    type: rss
    tier: institute
    topics: [semiconductor-industry, us-tech-policy, ai-industrial-policy]

  - name: MERICS — China Analysis
    url: https://merics.org/en/rss
    type: rss
    tier: institute
    topics: [semiconductor-industry, us-tech-policy, ai-industrial-policy]

  # ---- Tier 3: secondary / trade journalism (breadth & fast signals) -------
  - name: Semiconductor Engineering
    url: https://semiengineering.com/feed/
